        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .game-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 480px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }
        .progress-bar-container {
            width: 100%;
            height: 5px;
            background-color: #333;
            position: absolute;
            top: 0;
            left: 0;
        }
        .progress-bar {
            height: 100%;
            background-color: #1db954;
            width: 0%;
            transition: width 0.4s ease;
        }
        h1 {
            color: #1db954;
            margin-top: 10px;
            font-size: 2.2em;
            letter-spacing: 2px;
        }
        p.subtitle {
            color: #b3b3b3;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .lang-selection {
            display: flex;
            justify-content: space-around;
            background-color: #2b2b2b;
            padding: 15px 10px;
            border-radius: 15px;
            border: 2px solid #404040;
            margin-bottom: 25px;
        }
        .lang-selection label {
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }
        .lang-selection label:hover {
            color: #1db954;
        }
        input[type="radio"] {
            accent-color: #1db954;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .mode-btn {
            display: block;
            width: 100%;
            background-color: #2b2b2b;
            color: white;
            border: 2px solid #404040;
            padding: 15px;
            font-size: 1.2em;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .mode-btn:hover {
            border-color: #1db954;
            background-color: #333;
            transform: translateY(-2px);
        }
        .mode-btn span {
            display: block;
            font-size: 0.8em;
            font-weight: normal;
            color: #b3b3b3;
            margin-top: 5px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .back-btn {
            background-color: transparent;
            color: #b3b3b3;
            border: 1px solid #404040;
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background-color: #333;
            color: white;
            border-color: #1db954;
        }

        .song-info {
            background: #282828;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0 20px 0;
            position: relative;
        }
        .album-art {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            margin: 0 auto 15px auto;
            display: none; 
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .song-title {
            font-weight: bold;
            font-size: 1.6em;
            margin-bottom: 5px;
        }
        .song-artist {
            color: #b3b3b3;
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        .audio-player-container {
            margin-top: 15px;
            min-height: 54px;
        }
        audio {
            width: 100%;
            height: 40px;
            outline: none;
            border-radius: 20px;
        }
        .loading-text {
            color: #1db954;
            font-size: 0.9em;
        }
        .input-area {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        input[type="text"], input[type="number"] {
            padding: 15px;
            font-size: 1.2em;
            border-radius: 25px;
            border: 2px solid #404040;
            background-color: #2b2b2b;
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            font-weight: bold;
            width: 80%;
            max-width: 250px;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: #1db954;
            background-color: #333;
        }
        .buttons-row {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            width: 100%;
            justify-content: center;
        }
        button.action-btn {
            background-color: #1db954;
            color: white;
            border: none;
            padding: 14px 25px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(29, 185, 84, 0.3);

        button.action-btn:hover {
            background-color: #1ed760;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(29, 185, 84, 0.4);
        }
        button.action-btn:active {
            transform: translateY(1px);
        }
        button.action-btn.secondary {
            background-color: #404040;
            box-shadow: none;
        }
        button.action-btn.secondary:hover {
            background-color: #505050;
        }
        .feedback {
            font-size: 1.1em;
            font-weight: bold;
            min-height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 10px;
            line-height: 1.4;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #404040;
            padding-top: 20px;
            font-size: 1.1em;
            color: #b3b3b3;
        }
        .hidden {
            display: none !important;

</head>

        <h1>🎸 Beatstoria</h1>
        
        <div id="startScreen">
            <p class="subtitle" style="margin-bottom: 5px;">אילו שירים בא לך לשמוע?</p>
            <div class="lang-selection">
                <label><input type="radio" name="langPref" value="both" checked> הכל 🌍</label>
                <label><input type="radio" name="langPref" value="he"> ישראלי 🇮🇱</label>
                <label><input type="radio" name="langPref" value="en"> לועזי 🇺🇸</label>
            </div>

            <p class="subtitle" style="margin-top: 20px; margin-bottom: 10px;">מה רמת האתגר?</p>
            
            <button class="mode-btn" onclick="startGame('year')">
                📅 נחש את השנה
                <span>אני אתן לך את שם השיר, את תנחשי את שנת ההוצאה.</span>
            </button>
            
            <button class="mode-btn" onclick="startGame('name')">
                🎤 נחש את השיר
                <span>שם השיר יוסתר! תקשיבי לקטע ונחשי איך קוראים לו.</span>
            </button>

            <button class="mode-btn" onclick="startGame('both')" style="border-color: #1db954;">
                🔥 האתגר הכפול
                <span>נחשי גם את השיר וגם את השנה. מקסימום נקודות!</span>
            </button>
        </div>

        <div id="gameScreen" class="hidden">
            <div class="top-bar">
                <p id="gameInstruction" style="color: #b3b3b3; margin: 0; font-size: 0.95em;"></p>
                <button class="back-btn" onclick="showStartScreen()">🔙 לתפריט הראשי</button>
            </div>
            
            <div class="song-info">
                <img id="albumArt" class="album-art" src="" alt="Album Art">
                <div class="song-title" id="songTitle">שם השיר</div>
                <div class="song-artist" id="songArtist">אמן</div>
                
                <div class="audio-player-container" id="audioContainer">
                    <span class="loading-text" id="loadingText">מחפש קטע שמע... ⏳</span>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="nameInput" placeholder="איך קוראים לשיר?" class="hidden">
                <input type="number" id="yearInput" placeholder="שנת הוצאה (למשל 1995)" class="hidden">
                
                <div class="buttons-row">
                    <button id="prevBtn" class="action-btn secondary hidden" onclick="prevSong()">⏮️ קודם</button>
                    <button id="submitBtn" class="action-btn" onclick="checkGuess()">שלחי ניחוש</button>
                </div>
            </div>
            
            <div class="feedback" id="feedbackMsg"></div>
            
            <div class="score-board">
                <span id="scoreDisplay">נקודות: 0</span>
                <span id="progressDisplay">שיר 1 / 10</span>
            </div>
        </div>

            <h2 style="font-size: 2em; margin-bottom: 10px;">המשחק נגמר! 🎉</h2>

            <button class="action-btn" onclick="showStartScreen()">לתפריט הראשי 🔄</button>
        </div>
    </div>

            { title: "As It Was", artist: "Harry Styles", year: 2022 },
            { title: "Levitating", artist: "Dua Lipa", year: 2020 },
            { title: "Flowers", artist: "Miley Cyrus", year: 2023 },
            { title: "vampire", artist: "Olivia Rodrigo", year: 2023 },
            { title: "Espresso", artist: "Sabrina Carpenter", year: 2024 }
        ];

        let currentMode = 'year'; 
        let currentSongsList = [];
        let currentSongIndex = 0;
        let score = 0;
        let songScores = []; 
        let isWaitingForNext = false;
        let currentAudio = null;
        let currentAlbumCoverUrl = null; 

        function normalizeString(str) {
            return str.toLowerCase().replace(/[^a-zא-ת0-9]/g, "").trim();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function showStartScreen() {
            document.getElementById("endScreen").classList.add("hidden");
            document.getElementById("gameScreen").classList.add("hidden");
            document.getElementById("startScreen").classList.remove("hidden");
            document.getElementById("progressBar").style.width = "0%";
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
        }

        function getFilteredSongs() {
            const langPref = document.querySelector('input[name="langPref"]:checked').value;
            
            if (langPref === 'both') {
                return [...allSongs];
            }

            return allSongs.filter(song => {
                const hasHebrew = /[א-ת]/.test(song.artist + song.title);
                if (langPref === 'he') return hasHebrew;
                if (langPref === 'en') return !hasHebrew;
            });
        }

        function startGame(mode) {
            currentMode = mode;
            document.getElementById("startScreen").classList.add("hidden");
            document.getElementById("endScreen").classList.add("hidden");
            document.getElementById("gameScreen").classList.remove("hidden");

            let filteredSongs = getFilteredSongs();
            shuffleArray(filteredSongs);
            
            currentSongsList = filteredSongs.slice(0, 10);
            
            score = 0;
            songScores = new Array(10).fill(0); 
            currentSongIndex = 0;
            updateScoreBoard();
            loadSong();
        }

        function prevSong() {
            if (currentSongIndex > 0) {
                currentSongIndex--;
                loadSong();
                updateScoreBoard();
            }
        }

        async function loadSong() {
            const song = currentSongsList[currentSongIndex];
            const titleEl = document.getElementById("songTitle");
            const nameInput = document.getElementById("nameInput");
            const yearInput = document.getElementById("yearInput");
            const instruction = document.getElementById("gameInstruction");
            const prevBtn = document.getElementById("prevBtn");

            if (currentSongIndex > 0) {
                prevBtn.classList.remove("hidden");
            } else {
                prevBtn.classList.add("hidden");
            }

            if (currentMode === 'year') {
                instruction.innerText = "באיזו שנה יצא השיר הבא?";
                titleEl.innerText = song.title;
                nameInput.classList.add("hidden");
                yearInput.classList.remove("hidden");
            } else if (currentMode === 'name') {
                instruction.innerText = "איך קוראים לשיר הזה?";
                titleEl.innerText = "???";
                nameInput.classList.remove("hidden");
                yearInput.classList.add("hidden");
            } else if (currentMode === 'both') {
                instruction.innerText = "אתגר כפול! נחשי את השם ואת השנה:";
                titleEl.innerText = "???";
                nameInput.classList.remove("hidden");
                yearInput.classList.remove("hidden");
            }

            document.getElementById("songArtist").innerText = song.artist;
            
            nameInput.value = "";
            yearInput.value = "";
            nameInput.disabled = false;
            yearInput.disabled = false;
            
            document.getElementById("feedbackMsg").innerHTML = "";
            document.getElementById("submitBtn").innerText = "שלחי ניחוש";
            document.getElementById("albumArt").style.display = "none"; 
            
            if (currentMode === 'name' || currentMode === 'both') nameInput.focus();
            else yearInput.focus();
            
            isWaitingForNext = false;
            currentAlbumCoverUrl = null;
            
            if (currentAudio) {
                currentAudio.pause();
            }

            await fetchAudioPreview(song.title, song.artist);
        }

        async function fetchAudioPreview(title, artist) {
            const audioContainer = document.getElementById("audioContainer");
            audioContainer.innerHTML = '<span class="loading-text" id="loadingText">מחפש קטע שמע... ⏳</span>';
            
            try {
                const query = encodeURIComponent(`${title} ${artist}`);
                const response = await fetch(`https://itunes.apple.com/search?term=${query}&media=music&limit=1`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    const result = data.results[0];
                    
                    if (result.artworkUrl100) {
                        currentAlbumCoverUrl = result.artworkUrl100.replace('100x100bb', '300x300bb');
                    }

                    if (result.previewUrl) {
                        const audioElement = document.createElement('audio');
                        audioElement.controls = true;
                        audioElement.src = result.previewUrl;
                        
                        audioContainer.innerHTML = '';
                        audioContainer.appendChild(audioElement);
                        currentAudio = audioElement;
                    } else {
                        audioContainer.innerHTML = '<span style="color: #ff9800; font-size: 0.9em;">השיר נמצא, אבל ללא קטע שמע פתוח להאזנה 😔</span>';
                    }
                } else {
                    audioContainer.innerHTML = '<span style="color: #f44336; font-size: 0.9em;">לא נמצא במאגר (אבל עדיין אפשר לנחש!)</span>';
                }
            } catch (error) {
                audioContainer.innerHTML = '<span style="color: #f44336; font-size: 0.9em;">שגיאה בחיבור לשרת השמע</span>';
            }
        }

        function checkGuess() {
            if (isWaitingForNext) {
                currentSongIndex++;
                if (currentSongIndex < currentSongsList.length) {
                    loadSong();
                    updateScoreBoard();
                } else {
                    endGame();
                }
                return;
            }

            const song = currentSongsList[currentSongIndex];
            const nameInputVal = document.getElementById("nameInput").value;
            const yearInputVal = document.getElementById("yearInput").value;
            const feedback = document.getElementById("feedbackMsg");
            const albumArtImg = document.getElementById("albumArt");
            
            if (currentMode === 'year' && !yearInputVal) { feedback.innerText = "נא להכניס שנה."; return; }
            if (currentMode === 'name' && !nameInputVal) { feedback.innerText = "נא לכתוב את שם השיר."; return; }
            if (currentMode === 'both' && (!yearInputVal || !nameInputVal)) { feedback.innerText = "נא למלא את שני השדות."; return; }

            let roundScore = 0;
            let feedbackText = "";

            if (currentMode === 'year' || currentMode === 'both') {
                const guessYear = parseInt(yearInputVal);
                const diff = Math.abs(guessYear - song.year);
                if (diff === 0) {
                    feedbackText += `📅 שנה: בול פגיעה! (${song.year}) <span style="color:#1db954">+3</span><br>`;
                    roundScore += 3;
                } else if (diff <= 2) {
                    feedbackText += `📅 שנה: קרוב! (${song.year}) <span style="color:#ffca28">+1</span><br>`;
                    roundScore += 1;
                } else {
                    feedbackText += `📅 שנה: טעות. השנה היא ${song.year}.<br>`;
                }
            }

            if (currentMode === 'name' || currentMode === 'both') {
                const guessNameNorm = normalizeString(nameInputVal);
                const actualNameNorm = normalizeString(song.title);
                
                if (guessNameNorm === actualNameNorm) {
                    feedbackText += `🎤 שם שיר: מדויק! <span style="color:#1db954">+3</span><br>`;
                    roundScore += 3;
                } else {
                    feedbackText += `🎤 שם שיר: לא מדויק. השם הוא "${song.title}".<br>`;
                }
            }

            songScores[currentSongIndex] = roundScore;
            score = songScores.reduce((a, b) => a + b, 0);

            if (currentAlbumCoverUrl) {
                albumArtImg.src = currentAlbumCoverUrl;
                albumArtImg.style.display = "block";
            }
            document.getElementById("songTitle").innerText = song.title; 
            document.getElementById("nameInput").disabled = true; 
            document.getElementById("yearInput").disabled = true; 

            if (roundScore > 0) {
                feedback.style.color = "#ffffff";
            } else {
                feedback.style.color = "#f44336"; 
            }
            
            feedback.innerHTML = feedbackText;

            isWaitingForNext = true;
            document.getElementById("submitBtn").innerText = "לשיר הבא ⏭️";
            updateScoreBoard();
        }

        function updateScoreBoard() {
            document.getElementById("scoreDisplay").innerText = `נקודות: ${score}`;
            document.getElementById("progressDisplay").innerText = `שיר ${currentSongIndex + 1} / ${currentSongsList.length}`;
            
            const progressPercentage = ((currentSongIndex) / currentSongsList.length) * 100;
            document.getElementById("progressBar").style.width = progressPercentage + "%";
        }

        function endGame() {
            if (currentAudio) currentAudio.pause();
            document.getElementById("progressBar").style.width = "100%";
            document.getElementById("gameScreen").classList.add("hidden");
            document.getElementById("endScreen").classList.remove("hidden");
            
            document.getElementById("finalScore").innerText = score;
            
            const pointsPerSong = (currentMode === 'both') ? 6 : 3;
            const maxScore = currentSongsList.length * pointsPerSong;
            document.getElementById("maxScoreDisplay").innerText = maxScore;
            
            let message = "";
            if (score >= maxScore * 0.8) {
                message = "וואו, מטורף! יש לך ידע פנומנלי במוזיקה! 👑";
            } else if (score >= maxScore * 0.4) {
                message = "יפה מאוד! שלטת יפה בציר הזמן 👏";
            } else {
                message = "לא נורא, תמיד אפשר לשחק שוב ולהשתפר 😉";
            }
            
            document.getElementById("finalMessage").innerText = message;
        }

        document.addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !document.getElementById("gameScreen").classList.contains("hidden")) {
                event.preventDefault();
                checkGuess();
            }
        });

        window.onload = showStartScreen;
    </script>
